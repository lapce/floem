[package]
name = "widget-gallery"
version = "0.1.0"
edition = "2024"

[dependencies]
floem = { path = "../..", features = ["vello"] }
strum = { workspace = true }
files = { path = "../files/", optional = true }

[target.'cfg(target_os = "macos")'.dependencies]
signpost = "*"

[features]
default = ["full"]
vello = ["floem/vello"]
full = ["dep:files"]
